<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supervisión — HSLV Contratación</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase.js"></script>
    <script src="/js/auth-guard.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

    <button id="sidebar-toggle" style="display:flex;">☰</button>
    <div class="sidebar"></div>

    <div class="content">

        <!-- TOPBAR -->
        <div class="topbar" style="flex-direction:column;align-items:center;
                            text-align:center;gap:6px;">
    <div style="font-size:28px;font-weight:900;color:#046A38;
                letter-spacing:1px;">
        ÁGORA <span style="color:#123C7B;">HSLV</span>
    </div>
    <div style="width:60px;height:3px;
                background:linear-gradient(90deg,#046A38,#123C7B);
                border-radius:2px;"></div>
    <h1 style="margin:0;font-size:20px;font-weight:800;color:#123C7B;">
        Registrar Supervisión
    </h1>
    <p style="margin:0;color:#6B7280;font-size:13px;">
        Complete los datos del supervisor y del contrato
    </p>
</div>

        <!-- CONTENIDO PRINCIPAL -->
        <div style="max-width:800px;margin:0 auto;">

            <!-- Sección Supervisor -->
            <div style="background:#F0FBF4;border:1px solid #C7EFD4;
                        border-radius:14px;padding:18px;margin-bottom:18px;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
                    <span style="font-size:16px;">👤</span>
                    <span style="font-size:14px;font-weight:800;color:#0B7A43;
                                 text-transform:uppercase;letter-spacing:.5px;">
                        Datos del Supervisor
                    </span>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label style="color:#0B7A43;font-size:13px;">
                            Nombre Completo del Supervisor
                        </label>
                        <input type="text" id="sup_nombre"
                            placeholder="Ej: Juan Carlos Pérez López"
                            style="border:1.5px solid #86d19d;border-radius:10px;
                                   padding:11px 13px;font-size:13px;width:100%;
                                   outline:none;transition:border .2s;"
                            onfocus="this.style.borderColor='#0B7A43'"
                            onblur="this.style.borderColor='#86d19d'">
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label style="color:#0B7A43;font-size:13px;">
                            Área del Supervisor
                        </label>
                        <input type="text" id="sup_area"
                            placeholder="Ej: Subdirección Administrativa"
                            style="border:1.5px solid #86d19d;border-radius:10px;
                                   padding:11px 13px;font-size:13px;width:100%;
                                   outline:none;transition:border .2s;"
                            onfocus="this.style.borderColor='#0B7A43'"
                            onblur="this.style.borderColor='#86d19d'">
                    </div>
                </div>

                <!-- Preview supervisor -->
                <div id="sup_preview"
                    style="display:none;margin-top:12px;background:white;
                           border:1px solid #BBF7D0;border-radius:10px;
                           padding:10px 14px;align-items:center;gap:10px;">
                    <span style="font-size:20px;">✅</span>
                    <div>
                        <div style="font-size:12px;color:#0B7A43;font-weight:700;"
                             id="sup_preview_nombre"></div>
                        <div style="font-size:11px;color:#6B7280;"
                             id="sup_preview_area"></div>
                    </div>
                </div>
            </div>

            <!-- Sección Contrato -->
            <div style="background:#EFF6FF;border:1px solid #BFDBFE;
                        border-radius:14px;padding:18px;margin-bottom:18px;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
                    <span style="font-size:16px;">📋</span>
                    <span style="font-size:14px;font-weight:800;color:#123C7B;
                                 text-transform:uppercase;letter-spacing:.5px;">
                        Datos del Contrato
                    </span>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;">
                    <div class="form-group" style="margin-bottom:0;">
                        <label style="color:#123C7B;font-size:13px;">
                            Número de Contrato
                        </label>
                        <input type="text" id="sup_contrato"
                            placeholder="Ej: CD1P-0012-2025"
                            style="border:1.5px solid #BFDBFE;border-radius:10px;
                                   padding:11px 13px;font-size:13px;width:100%;
                                   outline:none;transition:border .2s;"
                            onfocus="this.style.borderColor='#123C7B'"
                            onblur="this.style.borderColor='#BFDBFE'">
                    </div>
                    <div class="form-group" style="margin-bottom:0;">
                        <label style="color:#123C7B;font-size:13px;">
                            Avance Físico (%)
                        </label>
                        <input type="number" id="sup_avance"
                            min="0" max="100" placeholder="0 - 100"
                            oninput="supActualizarBarra(this.value)"
                            style="border:1.5px solid #BFDBFE;border-radius:10px;
                                   padding:11px 13px;font-size:13px;width:100%;
                                   outline:none;transition:border .2s;"
                            onfocus="this.style.borderColor='#123C7B'"
                            onblur="this.style.borderColor='#BFDBFE'">
                        <!-- Barra avance -->
                        <div style="margin-top:8px;height:8px;background:#DBEAFE;
                                    border-radius:6px;overflow:hidden;">
                            <div id="sup_barra"
                                style="height:100%;width:0%;
                                       background:linear-gradient(90deg,#0B7A43,#123C7B);
                                       border-radius:6px;transition:width .3s;"></div>
                        </div>
                        <div id="sup_pct_label"
                            style="font-size:11px;color:#6B7280;
                                   margin-top:4px;text-align:right;">0%</div>
                    </div>
                </div>
            </div>

            <!-- Hallazgos -->
            <div class="form-group" style="margin-bottom:18px;">
                <label style="color:#123C7B;font-weight:700;font-size:13px;">
                    📝 Hallazgos y Observaciones
                </label>
                <textarea id="sup_hallazgos" rows="5"
                    placeholder="Describa los hallazgos, observaciones o novedades
identificadas durante la supervisión…"
                    style="border:1.5px solid #CBD5E1;border-radius:12px;
                           padding:13px;font-size:13px;width:100%;resize:vertical;
                           outline:none;transition:border .2s;min-height:120px;"
                    onfocus="this.style.borderColor='#123C7B'"
                    onblur="this.style.borderColor='#CBD5E1'"></textarea>
            </div>

            <!-- Botones -->
            <div style="display:flex;justify-content:flex-end;
                        gap:12px;flex-wrap:wrap;
                        border-top:1px solid #E5E7EB;padding-top:18px;">
                <button class="btn"
                    onclick="window.location.href='/dashboard'"
                    style="background:#F3F4F6;color:#374151;
                           border:none;min-width:140px;">
                    ← Volver al Dashboard
                </button>
                <button class="btn"
                    onclick="supLimpiar()"
                    style="background:white;color:#0B7A43;
                           border:2px solid #86d19d;min-width:140px;">
                    🗑 Limpiar
                </button>
                <button class="btn finalizar-btn"
                    onclick="registrarSupervision()"
                    style="background:linear-gradient(90deg,#0B7A43,#123C7B);
                           color:white;min-width:200px;font-size:15px;">
                    ✅ Registrar Supervisión
                </button>
            </div>

        </div><!-- fin max-width -->

    </div><!-- fin content -->

    <script src="/js/sidebar.js"></script>
    <script src="/js/script.js"></script>

</body>
</html>
